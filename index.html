<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>Book Brain</title>
    <meta name="description" content="AI-powered book recommendations based on 10 years of reading. Ask what to read next." />
    <meta property="og:site_name" content="Book Brain" />
    <meta property="og:title" content="Book Brain — AI Book Recommendations" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="AI-powered book recommendations based on 10 years of reading. Ask what to read next." />
    <meta property="og:url" content="https://bookbrain.app" />
    <meta property="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Gilda+Display&display=swap" rel="stylesheet" />
    <style>
      body { background: #f2f2f2; margin: 0; }
      #root { opacity: 0; transition: opacity .15s ease-in; }
      #root.ready { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      new MutationObserver(function(m, o) {
        if (document.getElementById("root").children.length) {
          document.getElementById("root").classList.add("ready");
          o.disconnect();
        }
      }).observe(document.getElementById("root"), { childList: true });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
