<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>Book Brain</title>
    <meta name="description" content="AI-powered book recommendations based on 10 years of reading. Ask what to read next." />
    <meta property="og:site_name" content="Book Brain" />
    <meta property="og:title" content="Book Brain — Personalized Book Recommendations" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="AI-powered book recommendations based on 10 years of reading. Ask what to read next." />
    <meta property="og:url" content="https://bookbrain.app" />
    <meta property="og:image" content="https://bookbrain.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:image" content="https://bookbrain.app/og-image.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { background: #f2f2f2; margin: 0; }
      #root { opacity: 0; transition: opacity .15s ease-in; }
      #root.ready { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      new MutationObserver(function(m, o) {
        if (document.getElementById("root").children.length) {
          document.getElementById("root").classList.add("ready");
          o.disconnect();
        }
      }).observe(document.getElementById("root"), { childList: true });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
